<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wrong Question Book</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; max-width: 960px; margin: 30px auto; line-height: 1.7; color: #222; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; background: #fff; }
        .meta { color: #667085; margin-bottom: 10px; }
        .choice { margin: 6px 0; }
        .answer-box { margin-top: 12px; padding: 12px; border-radius: 8px; background: #fff7e6; }
        button, .link-button { padding: 10px 18px; cursor: pointer; border-radius: 8px; border: 1px solid #d0d5dd; background: #fff; color: #222; text-decoration: none; }
        .remove-btn { margin-top: 12px; background: #fff1f2; border-color: #fda4af; color: #b42318; }
        #status { color: #666; }
        .empty { padding: 20px; border: 1px dashed #d0d5dd; border-radius: 10px; color: #666; background: #fafafa; }
    </style>
</head>
<body>
<div class="toolbar">
    <div>
        <h2 style="margin: 0;">Wrong Question Book</h2>
        <p id="status">Loading wrong questions from MinIO...</p>
    </div>
    <div class="toolbar-actions">
        <a class="link-button" href="ai.html">Back To Builder</a>
        <a class="link-button" href="javascript:history.back()">Back</a>
    </div>
</div>

<div id="wrongQuestions"></div>

<script>
    const userKey = getOrCreateUserKey();

    window.onload = function () {
        loadWrongQuestions();
    };

    async function loadWrongQuestions() {
        const status = document.getElementById('status');

        try {
            const response = await fetch('/api/wrong-questions?userKey=' + encodeURIComponent(userKey));
            const json = await response.json();

            if (!response.ok || json.code !== 200) {
                throw new Error(json.msg || 'Failed to load wrong question book');
            }

            const items = json.data || [];
            status.textContent = 'Loaded ' + items.length + ' wrong questions from MinIO bucket.';
            renderWrongQuestions(items);
        } catch (error) {
            status.textContent = error.message || 'Failed to load wrong question book';
            document.getElementById('wrongQuestions').innerHTML = '';
        }
    }

    function renderWrongQuestions(items) {
        const container = document.getElementById('wrongQuestions');

        if (!items.length) {
            container.innerHTML = '<div class="empty">No favorite wrong questions yet. Go answer some questions first.</div>';
            return;
        }

        container.innerHTML = items.map((item, index) => {
            let html = `<div class="card">`;
            html += `<h3>${index + 1}. ${escapeHtml(item.title || '')}</h3>`;
            html += `<div class="meta">Type: ${escapeHtml(item.type || '')} | Collected At: ${escapeHtml(item.collectedAt || '')}</div>`;

            if (item.type === 'CHOICE' && Array.isArray(item.choices)) {
                html += item.choices.map(choice => `<div class="choice">- ${escapeHtml(choice.content || '')}</div>`).join('');
            }

            if (item.type === 'JUDGE') {
                html += `<div class="choice">- True</div><div class="choice">- False</div>`;
            }

            html += `<div class="answer-box">`;
            html += `Your Answer: ${escapeHtml(item.userAnswer || 'Not answered')}<br>`;
            html += `Correct Answer: ${escapeHtml(item.correctAnswer || '')}`;
            if (item.analysis) {
                html += `<br>Analysis: ${escapeHtml(item.analysis)}`;
            }
            html += `</div>`;
            html += `<button class="remove-btn" onclick="removeWrongQuestion(${item.questionId})">Remove Favorite</button>`;
            html += `</div>`;
            return html;
        }).join('');
    }

    async function removeWrongQuestion(questionId) {
        try {
            const response = await fetch('/api/wrong-questions/' + questionId + '?userKey=' + encodeURIComponent(userKey), {
                method: 'DELETE'
            });
            const json = await response.json();

            if (!response.ok || json.code !== 200) {
                throw new Error(json.msg || 'Failed to remove favorite');
            }

            renderWrongQuestions(json.data || []);
            document.getElementById('status').textContent = 'Favorite removed and MinIO bucket updated.';
        } catch (error) {
            alert(error.message || 'Failed to remove favorite');
        }
    }

    function getOrCreateUserKey() {
        let current = localStorage.getItem('wrongQuestionUserKey');
        if (!current) {
            current = 'browser-' + Math.random().toString(36).slice(2, 10);
            localStorage.setItem('wrongQuestionUserKey', current);
        }
        return current;
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
