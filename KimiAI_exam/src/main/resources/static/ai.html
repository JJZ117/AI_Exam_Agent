<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Question Generator</title>
    <style>
        :root {
            --bg: linear-gradient(160deg, #f3f7ff 0%, #eefaf2 100%);
            --card: rgba(255, 255, 255, 0.94);
            --primary: #1f6feb;
            --primary-hover: #1757b8;
            --border: #d7e3f4;
            --text: #17324d;
            --muted: #5f7288;
            --shadow: 0 18px 45px rgba(43, 83, 135, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 36px 18px 48px;
            font-family: "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
        }

        .hero {
            margin-bottom: 24px;
        }

        .hero h2 {
            margin-bottom: 8px;
            font-size: 32px;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            box-shadow: var(--shadow);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 6px;
            font-size: 36px;
            line-height: 1.2;
        }

        .card p {
            margin-top: 0;
            color: var(--muted);
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 600;
        }

        .type-group-label {
            margin-bottom: 10px;
        }

        .type-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 6px;
        }

        .type-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f8fbff;
            font-weight: 500;
            cursor: pointer;
        }

        .type-option input {
            width: auto;
            margin: 0;
            padding: 0;
        }

        .file-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .file-picker {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f7fbff;
            cursor: pointer;
        }

        .file-picker-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
        }

        .file-picker-name {
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        input, button {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font: inherit;
        }

        input[type="file"] {
            background: #f7fbff;
        }

        button {
            margin-top: 16px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .secondary {
            background: #edf4ff;
            color: var(--primary);
        }

        .secondary:hover {
            background: #ddeaff;
        }

        .actions {
            margin-top: 18px;
        }

        #status {
            margin-top: 18px;
            min-height: 24px;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="page">
    <div class="hero">
        <h2>AI Exam Builder</h2>
        <p>Create questions by topic or generate similar ones from an uploaded image, with a custom question count.</p>
    </div>

    <div class="grid">
        <section class="card">
            <h3>Generate By Topic</h3>
            <label for="topic">Topic</label>
            <input id="topic" placeholder="For example: Java Basics, Operating Systems, Reading Comprehension">

            <label for="count">Question Count</label>
            <input id="count" type="number" min="1" max="20" value="5" placeholder="Number of questions">

            <label class="type-group-label">Question Types</label>
            <div class="type-group" id="topicQuestionTypes">
                <label class="type-option"><input type="checkbox" value="CHOICE" checked> Multiple Choice</label>
                <label class="type-option"><input type="checkbox" value="TEXT" checked> Short Answer</label>
                <label class="type-option"><input type="checkbox" value="JUDGE" checked> True / False</label>
            </div>

            <button onclick="generateAI()">Generate And Start Exam</button>
        </section>

        <section class="card">
            <h3>Generate Similar Questions By Image</h3>
            <label for="imageFile">Upload Image</label>
            <input id="imageFile" class="file-input" type="file" accept="image/*" onchange="updateFileName()">
            <label class="file-picker" for="imageFile">
                <span class="file-picker-button">Choose File</span>
                <span class="file-picker-name" id="fileName">No file chosen</span>
            </label>

            <label for="imageTopic">Optional Topic Hint</label>
            <input id="imageTopic" placeholder="Optional, for example: Newton's Laws, Database Indexes">

            <label for="imageCount">Question Count</label>
            <input id="imageCount" type="number" min="1" max="20" value="5" placeholder="Number of questions">

            <label class="type-group-label">Question Types</label>
            <div class="type-group" id="imageQuestionTypes">
                <label class="type-option"><input type="checkbox" value="CHOICE" checked> Multiple Choice</label>
                <label class="type-option"><input type="checkbox" value="TEXT" checked> Short Answer</label>
                <label class="type-option"><input type="checkbox" value="JUDGE" checked> True / False</label>
            </div>

            <button onclick="generateByImage()">Analyze Image And Generate Similar Questions</button>
        </section>
    </div>

    <div class="actions">
        <button class="secondary" onclick="window.location.href='wrong-book.html'">Open Wrong Question Book</button>
    </div>

    <p id="status"></p>
</div>

<script>
    async function createExamAndRedirect(name, questions) {
        const examRes = await fetch('/api/exam/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, questions })
        });
        const examJson = await examRes.json();

        if (!examRes.ok || examJson.code !== 200 || !examJson.data) {
            throw new Error(examJson.msg || 'Failed to create exam');
        }

        window.location.href = 'exam.html?id=' + examJson.data;
    }

    function getSelectedQuestionTypes(containerId) {
        return Array.from(document.querySelectorAll('#' + containerId + ' input[type="checkbox"]:checked'))
            .map(input => input.value);
    }

    function updateFileName() {
        const fileInput = document.getElementById('imageFile');
        const fileName = document.getElementById('fileName');
        const file = fileInput.files[0];
        fileName.textContent = file ? file.name : 'No file chosen';
    }

    async function generateAI() {
        const topic = document.getElementById('topic').value.trim();
        const count = Number(document.getElementById('count').value || 5);
        const questionTypes = getSelectedQuestionTypes('topicQuestionTypes');
        const status = document.getElementById('status');

        if (!topic) {
            alert('Please enter a topic first');
            return;
        }

        if (questionTypes.length === 0) {
            alert('Please select at least one question type');
            return;
        }

        status.textContent = 'AI is generating questions. Please wait...';

        try {
            const generateRes = await fetch('/api/questions/batch/ai-generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic, count, questionTypes })
            });
            const generateJson = await generateRes.json();
            const questions = generateJson.data || [];

            if (!generateRes.ok || generateJson.code !== 200 || questions.length === 0) {
                throw new Error(generateJson.msg || 'Failed to generate questions with AI');
            }

            await createExamAndRedirect(topic + ' AI Exam', questions);
        } catch (error) {
            status.textContent = 'Generation failed';
            alert(error.message || 'Generation failed');
        }
    }

    async function generateByImage() {
        const fileInput = document.getElementById('imageFile');
        const imageTopic = document.getElementById('imageTopic').value.trim();
        const count = Number(document.getElementById('imageCount').value || 5);
        const questionTypes = getSelectedQuestionTypes('imageQuestionTypes');
        const status = document.getElementById('status');
        const file = fileInput.files[0];

        if (!file) {
            alert('Please upload an image first');
            return;
        }

        if (questionTypes.length === 0) {
            alert('Please select at least one question type');
            return;
        }

        status.textContent = 'AI is analyzing the image and generating similar questions. Please wait...';

        try {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('count', String(count));
            if (imageTopic) {
                formData.append('topic', imageTopic);
            }
            questionTypes.forEach(type => formData.append('questionTypes', type));

            const generateRes = await fetch('/api/questions/batch/ai-generate-by-image', {
                method: 'POST',
                body: formData
            });
            const generateJson = await generateRes.json();
            const questions = generateJson.data || [];

            if (!generateRes.ok || generateJson.code !== 200 || questions.length === 0) {
                throw new Error(generateJson.msg || 'Failed to generate questions from image');
            }

            const examName = (imageTopic || 'Image Analysis') + ' Similar Question Exam';
            await createExamAndRedirect(examName, questions);
        } catch (error) {
            status.textContent = 'Generation failed';
            alert(error.message || 'Generation failed');
        }
    }
</script>
</body>
</html>
